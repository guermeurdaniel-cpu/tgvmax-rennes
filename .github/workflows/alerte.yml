name: Alerte TGV Max

on:
  schedule:
    - cron: '15 6 * * *'
    - cron: '15 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Exécuter le script d'alerte
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node alerte_tgvmax.js
      - name: Commit état et historique
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tgvmax_state.json historique.jsonl
          git diff --cached --quiet || git commit -m "MAJ état TGV Max [skip ci]"
          git push
