<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TGV Max Paris–Rennes</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--txt:#e6edf3;--muted:#8b949e;--acc:#2ea043;--acc2:#58a6ff;--warn:#d29922;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:12px;padding-bottom:40px;max-width:760px;margin:0 auto;}
h1{font-size:1.15em;margin:6px 0 12px;display:flex;align-items:center;gap:8px;}
h1 small{color:var(--muted);font-weight:normal;font-size:0.65em;}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab{flex:1;padding:9px 6px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:0.9em;user-select:none;}
.tab.active{border-color:var(--acc2);background:#0d2137;color:var(--acc2);font-weight:600;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.daybtn{padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;font-size:0.8em;cursor:pointer;color:var(--muted);user-select:none;}
.daybtn.on{border-color:var(--acc);color:var(--acc);background:#0d2117;}
.datecard{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.datehead{padding:8px 12px;font-weight:600;font-size:0.9em;background:#1c2129;display:flex;justify-content:space-between;}
.datehead .n{color:var(--acc);font-weight:normal;font-size:0.9em;}
.train{display:flex;align-items:center;gap:10px;padding:8px 12px;border-top:1px solid var(--border);font-size:0.9em;}
.train .hours{font-variant-numeric:tabular-nums;font-weight:600;min-width:110px;}
.train .dur{color:var(--muted);font-size:0.85em;}
.train .num{margin-left:auto;color:var(--muted);font-size:0.8em;}
.train.matched{border-left:3px solid var(--acc);}
.empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:0.9em;}
#status{color:var(--muted);font-size:0.8em;margin-bottom:10px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px;}
.panel h2{font-size:0.95em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.panel h2 .toggle{color:var(--acc2);font-size:0.85em;cursor:pointer;font-weight:normal;}
.rule{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.rule select,.rule input[type=time]{background:#0d1117;color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:5px 6px;font-size:0.85em;}
